<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta author="author" content="Noah Whittacre">
    <meta name="description" content="An assignment to practice forms in JavaScript">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Sign Up Form</title>
    <link rel="icon" href="party.png">
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
</head>
<body>
    <main class="wrapper">
        <h1>Event Ticket</h1>
        
        <form id="eventForm">
            <div class="field">
                <label for="firstName">First Name</label>
                <input id="firstName" name="firstName" type="text" required/>
            </div>

            <div class="field">
                <label for="lastName">Last Name</label>
                <input id="lastName" name="lastName" type="text" required/>
            </div>

            <div class="field full">
                <label for="email">Email</label>
                <input id="email" name="email" type="email" required/>
            </div>

            <div class="field">
                <label for="userType">Type</label>
                <select id="userType" name="userType" aria-controls="eventCode" required>
                    <option value="">Choose One</option>
                    <option value="student">Student</option>
                    <option value="guest">Guest</option>
                </select>
            </div>

            <div class="field">
                <label for="date">Event Date</label>
                <input id="date" name="date" type="date" required/>
            </div>

            <div id="eventCodeStudent" class="field full" hidden>
                <label for="studentID">Student I#:</label>
                <input id="studentID" name="studentID" type="text" pattern="[0-9]+"/>
            </div>

            <div id="eventCodeGuest" class="field full" hidden>
                <label for="accessCode">Access Code:</label>
                <input id="accessCode" name="accessCode" type="text"/>
            </div>

            <button class="full" type="submit">Create Ticket</button>
        </form>

        <section id="output" aria-live="polite"></section>
    </main>
</body>
</html>
